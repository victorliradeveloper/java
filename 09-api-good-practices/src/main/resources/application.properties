spring.application.name=todo-app

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tododb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Pageable
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

# JWT
jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-para-desenvolvimento}
jwt.expiration-hours=2

# Flyway
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Rate Limiting
rate-limit.auth.requests-per-minute=10
rate-limit.api.requests-per-minute=100
